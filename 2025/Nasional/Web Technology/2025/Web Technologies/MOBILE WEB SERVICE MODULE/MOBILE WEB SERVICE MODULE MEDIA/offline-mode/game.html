<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Block Dodger Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #222;
      border: 2px solid #fff;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="400" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const player = {
      x: 180,
      y: 550,
      width: 40,
      height: 40,
      speed: 5
    };

    const blocks = [];
    let score = 0;
    let gameOver = false;

    function createBlock() {
      const size = 40;
      const x = Math.floor(Math.random() * (canvas.width - size));
      blocks.push({ x, y: -size, size, speed: 3 });
    }

    function update() {
      if (gameOver) return;

      // Move blocks
      for (let b of blocks) {
        b.y += b.speed;

        // Check collision
        if (
          b.x < player.x + player.width &&
          b.x + b.size > player.x &&
          b.y < player.y + player.height &&
          b.y + b.size > player.y
        ) {
          gameOver = true;
        }
      }

      // Remove off-screen blocks
      for (let i = blocks.length - 1; i >= 0; i--) {
        if (blocks[i].y > canvas.height) {
          blocks.splice(i, 1);
          score++;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw player
      ctx.fillStyle = 'lime';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Draw blocks
      ctx.fillStyle = 'red';
      for (let b of blocks) {
        ctx.fillRect(b.x, b.y, b.size, b.size);
      }

      // Draw score
      ctx.fillStyle = '#fff';
      ctx.font = '20px Arial';
      ctx.fillText('Score: ' + score, 10, 25);

      if (gameOver) {
        ctx.fillStyle = 'yellow';
        ctx.font = '40px Arial';
        ctx.fillText('Game Over', 90, canvas.height / 2);
      }
    }

    function gameLoop() {
      update();
      draw();
      if (!gameOver) requestAnimationFrame(gameLoop);
    }

    // Handle keys
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' && player.x > 0) {
        player.x -= player.speed;
      } else if (e.key === 'ArrowRight' && player.x < canvas.width - player.width) {
        player.x += player.speed;
      }
    });

    // Spawn blocks periodically
    setInterval(() => {
      if (!gameOver) createBlock();
    }, 800);

    // Start the game
    gameLoop();
  </script>
</body>
</html>
